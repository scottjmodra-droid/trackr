<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a0633">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TRACKR">
<title>TRACKR</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%232a0d52'/%3E%3Cpath d='M14 30h6v4h-6zm30 0h6v4h-6zm-26-6h4v16h-4zm32 0h4v16h-4zm-26 6h20v4H24z' fill='%23e8f84a'/%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%232a0d52'/%3E%3Cpath d='M40 84h17v12H40zm83 0h17v12h-17zM57 67h11v46H57zm55 0h11v46h-11zM68 84h44v12H68z' fill='%23e8f84a'/%3E%3C/svg%3E">
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  background: #1a0633;
  color: #f0e6ff;
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior-y: none;
}
body {
  background:
    radial-gradient(ellipse at top, #4a1480 0%, transparent 55%),
    radial-gradient(ellipse at bottom right, #6b1b9a 0%, transparent 50%),
    linear-gradient(180deg, #1a0633 0%, #2a0d52 100%);
  background-attachment: fixed;
}
input, button, select { font-family: inherit; outline: none; }
button { -webkit-appearance: none; appearance: none; cursor: pointer; }
input[type="number"]::-webkit-inner-spin-button,
input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
input[type="number"] { -moz-appearance: textfield; }
input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.6); }

.app {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  min-height: 100dvh;
  padding-bottom: calc(20px + env(safe-area-inset-bottom));
}

.header {
  padding: calc(20px + env(safe-area-inset-top)) 20px 0;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px;
  letter-spacing: 2px;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.title-meta { font-size: 14px; color: #d4baeb; margin-bottom: 16px; font-family: 'DM Sans', sans-serif; letter-spacing: 0; font-weight: 400; }
.menu-btn {
  background: transparent; border: none; color: #c8a8e8; font-size: 22px;
  padding: 4px 8px; line-height: 1; border-radius: 6px;
}
.menu-btn:active { background: rgba(255,255,255,0.1); }

.tabs { display: flex; gap: 0; }
.tab {
  flex: 1; padding: 14px 0; border: none; font-size: 14px;
  font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px;
  background: transparent; color: #d4baeb;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
}
.tab.active { background: rgba(255,255,255,0.08); color: #fff; border-bottom-color: #e8f84a; }

.section { padding: 20px; }

.discipline-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 20px;
}
.discipline-btn {
  padding: 12px 4px; border: 2px solid transparent; border-radius: 10px;
  transition: all 0.15s; min-height: 76px;
  color: #1a0633;
  /* background, border-color, and color set inline using discipline colour */
}
.discipline-btn.active {
  box-shadow: 0 6px 20px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.15) inset;
  transform: translateY(-1px);
}
.discipline-btn .icon { font-size: 26px; line-height: 1; }
.discipline-btn .label {
  font-size: 14px; font-family: 'Bebas Neue', sans-serif; letter-spacing: 1.5px;
  color: inherit; margin-top: 4px;
}
.discipline-btn .count {
  font-size: 13px; color: inherit; opacity: 0.8; margin-top: 2px;
  font-family: 'Bebas Neue', sans-serif;
}

.field { margin-bottom: 14px; }
.date-row {
  display: grid;
  grid-template-columns: 44px minmax(0, 1fr) 44px;
  gap: 8px; align-items: stretch;
  width: 100%;
}
.date-nav {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px;
  color: #d4baeb; font-size: 22px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  padding: 0;
}
.date-nav:active { background: rgba(255,255,255,0.12); color: #fff; }
.date-input-wrap { position: relative; min-width: 0; overflow: hidden; }
.date-input-wrap .input {
  width: 100%; min-width: 0; padding-right: 70px;
  -webkit-appearance: none; appearance: none;
  display: block; box-sizing: border-box;
  min-height: 50px;
}
/* iOS sometimes lays out the inner text container of <input type=date>
   beyond the input's box. Belt-and-braces: clip + force inner box too. */
.date-input-wrap .input::-webkit-date-and-time-value {
  text-align: left; width: 100%; min-width: 0; display: block;
}
.date-input-wrap.is-today .input {
  border-color: #e8f84a;
  box-shadow: 0 0 0 1px rgba(232, 248, 74, 0.3);
}
.date-day-badge {
  position: absolute; top: 50%; right: 10px; transform: translateY(-50%);
  background: rgba(255,255,255,0.10); color: #d4baeb;
  font-family: 'Bebas Neue', sans-serif; letter-spacing: 1.5px;
  font-size: 11px; padding: 3px 8px; border-radius: 4px;
  pointer-events: none;
}
.date-day-badge.is-today { background: #e8f84a; color: #1a0633; }
.field-label {
  font-size: 13px; color: #d4baeb; letter-spacing: 2px;
  font-family: 'Bebas Neue', sans-serif; margin-bottom: 7px; display: block;
}
.input {
  width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); border-radius: 8px;
  color: #fff; padding: 14px; font-size: 16px;
  backdrop-filter: blur(8px);
}
.input:focus { border-color: #e8f84a; }

.rpe-preview {
  margin-top: 12px; padding: 10px 14px; border-radius: 8px;
  border-left-width: 3px; border-left-style: solid;
}
.rpe-preview-label { font-size: 12px; }
.rpe-preview-bar { display: flex; gap: 3px; margin-top: 6px; }
.rpe-preview-bar > div { flex: 1; height: 4px; border-radius: 2px; background: #222; }

.computed-hint {
  font-size: 13px; color: #e8c8ff; margin-top: 6px; font-style: italic;
  cursor: pointer;
}
.computed-hint:active { color: #fff; }

.save-btn {
  width: 100%; margin-top: 24px; padding: 18px; border: none;
  border-radius: 12px; font-size: 17px; font-family: 'Bebas Neue', sans-serif;
  letter-spacing: 2.5px; color: #000; transition: all 0.3s;
}
.save-btn.saved { background: #1a2a0a !important; color: #a3e635 !important; border: 1px solid #a3e635; }

.today-section { margin-top: 28px; }
.today-label {
  font-size: 13px; color: #d4baeb; letter-spacing: 2px;
  font-family: 'Bebas Neue', sans-serif; margin-bottom: 10px;
}
.today-item {
  display: flex; align-items: center; gap: 12px; padding: 12px 14px;
  background: rgba(255,255,255,0.05); border-radius: 8px; margin-bottom: 6px;
  border-left: 3px solid;
  backdrop-filter: blur(8px);
}
.today-item .icon { font-size: 22px; }
.today-item .name { font-size: 16px; color: #f0e6ff; font-weight: 500; }
.today-item .meta { font-size: 13px; color: #c8a8e8; margin-top: 3px; }

.weekly-chart-label {
  font-family: 'Bebas Neue', sans-serif; letter-spacing: 3px;
  font-size: 13px; color: #d4baeb; margin-bottom: 14px;
}
.range-toggle {
  display: flex; gap: 4px; padding: 4px;
  background: rgba(255,255,255,0.05);
  border-radius: 10px; margin-bottom: 16px;
  border: 1px solid rgba(255,255,255,0.08);
}
.range-btn {
  flex: 1; padding: 9px 4px; border: none; border-radius: 7px;
  background: transparent; color: #d4baeb;
  font-family: 'Bebas Neue', sans-serif; letter-spacing: 1.5px;
  font-size: 12px; transition: all 0.15s;
}
.range-btn.active {
  background: rgba(232, 248, 74, 0.15);
  color: #e8f84a;
  box-shadow: 0 0 0 1px rgba(232, 248, 74, 0.4);
}

.period-nav {
  display: grid;
  grid-template-columns: 40px minmax(0, 1fr) 40px;
  gap: 6px; margin-bottom: 16px;
}
.period-step {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 8px;
  color: #d4baeb; font-size: 20px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  padding: 0;
}
.period-step:active { background: rgba(255,255,255,0.12); color: #fff; }
.period-step:disabled { opacity: 0.25; }
.period-label {
  position: relative;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 8px;
  padding: 9px 12px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  font-family: 'Bebas Neue', sans-serif;
  letter-spacing: 1.5px;
  font-size: 13px;
  color: #f0e6ff;
  min-width: 0;
}
.period-nav.is-current .period-label {
  border-color: #e8f84a;
  box-shadow: 0 0 0 1px rgba(232, 248, 74, 0.3);
}
.period-badge {
  background: #e8f84a; color: #1a0633;
  font-family: 'Bebas Neue', sans-serif;
  letter-spacing: 1.5px;
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
  flex-shrink: 0;
}

.chart-header {
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px; margin-bottom: 14px;
}
.chart-header .weekly-chart-label { margin-bottom: 0; }
.chart-header-toggles { display: flex; gap: 6px; flex-shrink: 0; }
.metric-toggle {
  display: inline-flex; gap: 2px; padding: 3px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 8px;
  flex-shrink: 0;
}
.metric-btn {
  padding: 5px 10px; border: none; border-radius: 5px;
  background: transparent; color: #9684b8;
  font-family: 'Bebas Neue', sans-serif; letter-spacing: 1.5px;
  font-size: 11px; transition: all 0.15s;
}
.metric-btn.active {
  background: rgba(232, 248, 74, 0.18);
  color: #e8f84a;
}

.daily-avg-line {
  position: absolute; left: 0; right: 0;
  height: 4px;
  /* Round white dots, widely spaced — visually distinct from the thin
     dashed gridlines (which are 1px dashed at low alpha). */
  background-image: radial-gradient(circle, rgba(255,255,255,0.95) 1.5px, transparent 2px);
  background-size: 14px 4px;
  background-repeat: repeat-x;
  background-position: 0 center;
  border: none;
  transform: translateY(50%);
  pointer-events: none;
  z-index: 3;
}

.daily-chart {
  position: relative;
  padding-left: 38px;
  padding-bottom: 22px;
}
.daily-y-axis {
  position: absolute; left: 0; top: 0; width: 34px; height: 160px;
  font-size: 10px; color: #9684b8; font-family: 'DM Sans', sans-serif;
}
.daily-y-axis span {
  position: absolute; right: 6px; line-height: 1;
  transform: translateY(-50%);
}
.daily-y-axis span.y-zero { transform: none; bottom: 0; }
.daily-grid {
  position: absolute; left: 38px; right: 0; top: 0; height: 160px;
  pointer-events: none;
}
.daily-grid > div {
  position: absolute; left: 0; right: 0; height: 0;
  border-top: 1px dashed rgba(255,255,255,0.08);
}
.daily-grid > div.zero { border-top: 1px solid rgba(255,255,255,0.18); }
.daily-bars {
  display: flex; gap: 4px; align-items: flex-end; height: 160px;
  position: relative;
}
.daily-bar-col {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  height: 100%; justify-content: flex-end; position: relative;
  min-width: 0;
}
.daily-bar-stack {
  width: 100%; display: flex; flex-direction: column-reverse;
  border-radius: 3px 3px 0 0; overflow: hidden; min-height: 0;
}
.daily-bar-seg { width: 100%; min-height: 2px; position: relative; }
.daily-bar-seg-label {
  position: absolute; left: 0; right: 0; top: 50%;
  transform: translateY(-50%);
  text-align: center;
  font-size: 9px; line-height: 1;
  color: #fff;
  font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.3px; font-weight: 700;
  text-shadow: 0 0 2px rgba(0,0,0,0.7), 0 0 3px rgba(0,0,0,0.5);
  pointer-events: none;
}
.daily-bar-total {
  position: absolute; left: -10px; right: -10px;
  text-align: center;
  font-size: 10px; line-height: 1;
  color: #e8f84a;
  font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.5px;
  white-space: nowrap;
  pointer-events: none;
}
.daily-bar-label {
  position: absolute; bottom: -20px; left: 0; right: 0;
  font-size: 10px; color: #9684b8; text-align: center; line-height: 1.2;
}
.daily-bar-label .dow { display: block; font-weight: 500; font-size: 10px; }
.daily-bar-label .dom { display: block; color: #7a6394; font-size: 9px; }
.daily-bar-label.weekend .dow { color: #c8a8e8; }
.daily-bar-label.today .dow { color: #e8f84a; font-weight: 700; }
.daily-bar-label.today .dom { color: #e8f84a; }
.daily-chart.dense .daily-bar-label .dow { font-size: 8px; }
.daily-chart.dense .daily-bar-label .dom { font-size: 8px; }
.weekly-legend { display: flex; gap: 14px; margin-top: 20px; flex-wrap: wrap; }
.weekly-legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #d4baeb; }
.weekly-legend-swatch { width: 8px; height: 8px; border-radius: 2px; }

.stats-grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 8px; margin-bottom: 16px;
}
.stat-card {
  background: rgba(255,255,255,0.06); border-radius: 10px; padding: 14px 16px;
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.08);
  min-width: 0;
  overflow: hidden;
}
.stat-value {
  font-size: 26px; font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  line-height: 1.1;
}
.stat-label { font-size: 12px; color: #d4baeb; margin-top: 3px; }

.history-list { display: flex; flex-direction: column; gap: 8px; }
.history-item {
  background: rgba(255,255,255,0.06); border-radius: 8px; padding: 12px 14px;
  border-left: 3px solid;
  position: relative;
  backdrop-filter: blur(8px);
  cursor: pointer;
  transition: background 0.15s;
}
.history-item:active { background: rgba(255,255,255,0.10); }
.history-item.editing { background: rgba(255,255,255,0.10); cursor: default; }
.history-item.editing:active { background: rgba(255,255,255,0.10); }
.history-edit { display: flex; flex-direction: column; gap: 10px; padding-top: 8px; }
.history-edit-field { display: flex; flex-direction: column; gap: 4px; }
.history-edit-field-label {
  font-size: 11px; color: #d4baeb; letter-spacing: 1.5px;
  font-family: 'Bebas Neue', sans-serif;
}
.history-edit-field .input { padding: 10px 12px; font-size: 15px; }
.history-edit-actions { display: flex; gap: 8px; margin-top: 6px; }
.history-edit-actions button {
  flex: 1; padding: 12px; border-radius: 6px;
  font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px;
  font-size: 13px; border: none;
}
.history-edit-cancel { background: rgba(255,255,255,0.06); color: #d4baeb; border: 1px solid rgba(255,255,255,0.10); }
.history-edit-save { background: #e8f84a; color: #1a0633; font-weight: 600; }
.history-item-top {
  display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;
}
.history-date { font-size: 14px; color: #d4baeb; font-weight: 500; }
.history-data { display: flex; gap: 14px; flex-wrap: wrap; }
.history-field { font-size: 16px; color: #fff; }
.history-field-label { color: #b090d0; font-size: 12px; margin-right: 3px; }
.history-delete {
  position: absolute; top: 8px; right: 8px;
  background: transparent; border: none; color: #9684b8;
  font-size: 20px; padding: 4px 10px; border-radius: 6px;
  line-height: 1;
}
.history-delete:active { color: #ff5577; background: rgba(255,0,80,0.15); }

.empty-state { color: #c8a8e8; font-size: 14px; padding: 28px 0; text-align: center; }

.menu-sheet {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  display: none; align-items: flex-end; justify-content: center;
  z-index: 100;
}
.menu-sheet.open { display: flex; }
.menu-sheet-inner {
  background: linear-gradient(180deg, #2a0d52 0%, #1a0633 100%);
  width: 100%; max-width: 480px;
  border-radius: 16px 16px 0 0; padding: 12px 12px calc(24px + env(safe-area-inset-bottom));
  border-top: 1px solid rgba(255,255,255,0.1);
}
.menu-handle {
  width: 40px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px;
  margin: 4px auto 16px;
}
.menu-item {
  width: 100%; background: transparent; border: none; color: #f0e6ff;
  text-align: left; padding: 16px 14px; font-size: 16px;
  border-radius: 8px; display: flex; align-items: center; gap: 12px;
}
.menu-item:active { background: rgba(255,255,255,0.08); }
.menu-item.danger { color: #ff5577; }
.menu-item .menu-icon { font-size: 18px; width: 24px; text-align: center; }

.workout-sheet {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  display: none; align-items: flex-end; justify-content: center;
  z-index: 110;
}
.workout-sheet.open { display: flex; }
.workout-sheet-inner {
  background: linear-gradient(180deg, #2a0d52 0%, #1a0633 100%);
  width: 100%; max-width: 480px;
  border-radius: 16px 16px 0 0;
  padding: 12px 16px calc(20px + env(safe-area-inset-bottom));
  border-top: 1px solid rgba(255,255,255,0.1);
  max-height: 85vh; overflow-y: auto;
}
.workout-title {
  font-family: 'Bebas Neue', sans-serif;
  letter-spacing: 2px;
  color: #fff; font-size: 22px;
  margin: 4px 0 12px;
}
.workout-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.10);
  border-left: 3px solid #e8f84a;
  border-radius: 10px;
  padding: 14px 14px 12px;
  margin-bottom: 10px;
}
.workout-card-head {
  display: flex; align-items: baseline; justify-content: space-between;
  gap: 8px; margin-bottom: 10px;
}
.workout-card-name {
  font-family: 'Bebas Neue', sans-serif; letter-spacing: 1.5px;
  font-size: 15px; color: #fff;
}
.workout-card-weeks {
  font-size: 13px; color: #c8a8e8;
  letter-spacing: 1px;
  font-family: 'Bebas Neue', sans-serif;
  background: rgba(255,255,255,0.06);
  padding: 2px 8px; border-radius: 10px;
}
.workout-legend {
  display: flex; gap: 14px; margin-bottom: 12px;
  font-size: 12px; color: #d4baeb;
}
.workout-legend .ti { margin-right: 4px; }

.workout-card.is-workout { border-left-color: #38bdf8; }
.workout-section { margin-top: 10px; }
.workout-section-title {
  font-family: 'Bebas Neue', sans-serif;
  letter-spacing: 2px;
  color: #38bdf8;
  font-size: 12px;
  margin: 0 0 4px;
  padding-top: 8px;
  border-top: 1px dashed rgba(255,255,255,0.10);
}
.workout-section:first-of-type .workout-section-title {
  border-top: none; padding-top: 0;
}
.workout-step {
  display: flex; align-items: center; gap: 10px;
  padding: 4px 0;
  font-size: 14px; color: #f0e6ff;
}
.workout-step.is-rest .move { color: #9684b8; font-style: italic; }
.workout-step .step-num {
  display: inline-block; min-width: 18px; text-align: center;
  font-family: 'Bebas Neue', sans-serif;
  color: #c8a8e8; font-size: 12px;
  background: rgba(255,255,255,0.06);
  border-radius: 3px;
  padding: 1px 0;
  flex-shrink: 0;
}
.workout-row {
  display: flex; align-items: center;
  gap: 10px; padding: 7px 0;
  font-size: 14px;
  border-top: 1px dashed rgba(255,255,255,0.08);
}
.workout-row:first-of-type { border-top: none; }

// ---------- State ----------
const state = {
  sessions: [],
  view: "log",
  activeDiscipline: "Swim",
  historyTab: "Swim",
  historyRange: "week",  // "week" | "month" | "all"
  historyOffset: 0,  // 0 = current period, -1 = last week/month, etc.
  historyMetric: "minutes",  // "minutes" | "calories"
  allTimeGranularity: "month",  // "month" | "week" — only used in All Time mode
  editingId: null,  // id of the history session currently being edited, or null

// Local-date version of YYYY-MM-DD (avoids the UTC off-by-one when the user
// is east of UTC — Sydney midnight is the previous day in UTC).
function localISO(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}
function todayISO() { return localISO(new Date()); }
function parseLocalISO(s) {
  const [y, m, d] = s.split("-").map(Number);
  return new Date(y, m - 1, d);
}
function mondayOf(d) {
  const out = new Date(d); out.setHours(0, 0, 0, 0);
  const offset = (out.getDay() + 6) % 7;  // Mon=0, Sun=6
  out.setDate(out.getDate() - offset);
  return out;
}
function firstOfMonth(d) {
  return new Date(d.getFullYear(), d.getMonth(), 1);
}
// "YYYY-MM" key for grouping sessions into calendar months.
function monthKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
}
// Compute the visible period bounds from the selected range + offset.
// Returns { start, end, label, isCurrent } where start/end are Date objects
// (or null for all-time which has no fixed bounds).
function periodBounds(range, offset) {
  const today = new Date(); today.setHours(0, 0, 0, 0);
  if (range === "week") {
    const monday = mondayOf(today);
    monday.setDate(monday.getDate() + offset * 7);
    const sunday = new Date(monday);
    sunday.setDate(monday.getDate() + 6);
    const sameMonth = monday.getMonth() === sunday.getMonth();
    const fmt = d => d.toLocaleDateString("en-AU", { day: "numeric", month: "short" });
    const label = sameMonth
      ? `${monday.getDate()} – ${sunday.getDate()} ${monday.toLocaleDateString("en-AU", { month: "short" })}`
      : `${fmt(monday)} – ${fmt(sunday)}`;
    return { start: monday, end: sunday, label, isCurrent: offset === 0 };
  }
  if (range === "month") {
    const first = new Date(today.getFullYear(), today.getMonth() + offset, 1);
    const last = new Date(today.getFullYear(), today.getMonth() + offset + 1, 0);
    const label = first.toLocaleDateString("en-AU", { month: "long", year: "numeric" }).toUpperCase();
    return { start: first, end: last, label, isCurrent: offset === 0 };
  }
  return { start: null, end: null, label: "ALL TIME", isCurrent: true };
}

// Pretty-print a duration in minutes for display.
// Below 60 min: show the original value with "m" (preserves decimals).
// 60 min or more: convert to "Xh Ym" (rounded to nearest minute).
function fmtDuration(minutes) {
  const m = parseFloat(minutes);
  if (!m || isNaN(m) || m <= 0) return "";
  if (m < 60) {
    // Strip trailing zero (e.g. "45.0" -> "45") but keep real decimals
    return (Number.isInteger(m) ? String(m) : String(m)) + "m";
  }
  const total = Math.round(m);
  const h = Math.floor(total / 60), rem = total % 60;
  return rem === 0 ? `${h}h` : `${h}h ${rem}m`;
}

function relativeDayLabel(iso) {
  const todayD = new Date(); todayD.setHours(0, 0, 0, 0);
  const d = parseLocalISO(iso);
  const diff = Math.round((d - todayD) / 86400000);
  if (diff === 0) return "TODAY";
  if (diff === -1) return "YESTERDAY";
  if (diff === 1) return "TOMORROW";
  return d.toLocaleDateString("en-AU", { weekday: "short", day: "numeric", month: "short" }).toUpperCase();
}
function emptyForm(discipline) {
  return Object.fromEntries(DISCIPLINE_CONFIG[discipline].fields.map(f => [f.key, ""]));
}
function formatDate(iso) {
  return new Date(iso).toLocaleDateString("en-AU", { day: "numeric", month: "short", year: "numeric" });
}
function escapeHtml(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[c]));
}
function uid() {
  return (crypto.randomUUID && crypto.randomUUID()) || (Date.now() + "-" + Math.random().toString(36).slice(2));
}
// Tint a hex color (#rrggbb or #rgb) toward an alpha overlay onto the dark bg.
function hexToRgb(hex) {
  let h = hex.replace("#", "");
  if (h.length === 3) h = h.split("").map(c => c + c).join("");
  return { r: parseInt(h.slice(0, 2), 16), g: parseInt(h.slice(2, 4), 16), b: parseInt(h.slice(4, 6), 16) };
}

  // Inactive: ~28% tint of the color on top of the dark purple background

// ---------- Apple Health import ----------
// Maps Apple's HKWorkoutActivityType strings to our disciplines. Anything not
// listed falls back to "Other" with a prettified type label so the entry is
// still identifiable in TRACKR.
const APPLE_ACTIVITY_MAP = {
  HKWorkoutActivityTypeRunning: { discipline: "Run" },
  HKWorkoutActivityTypeSwimming: { discipline: "Swim" },
  HKWorkoutActivityTypeRowing: { discipline: "Row" },
  HKWorkoutActivityTypeTraditionalStrengthTraining: { discipline: "Strength" },
  HKWorkoutActivityTypeFunctionalStrengthTraining: { discipline: "Strength" },
  HKWorkoutActivityTypeWalking: { discipline: "Walk" },
};
function mapAppleActivity(type) {
  if (APPLE_ACTIVITY_MAP[type]) return APPLE_ACTIVITY_MAP[type];
  // Fallback: strip the HKWorkoutActivityType prefix, add spaces before caps.
  const name = String(type || "Workout")
    .replace(/^HKWorkoutActivityType/, "")
    .replace(/([A-Z])/g, " $1")
    .trim();
  return { discipline: "Other", type: name };
}
// Parse an Apple Health export.xml. Handles both the older format (workout
// stats as attributes on <Workout>) and the iOS 18+ format (stats in nested
// <WorkoutStatistics> elements). Returns an array of TRACKR session objects.
function parseAppleHealthXML(xmlText) {
  const doc = new DOMParser().parseFromString(xmlText, "application/xml");
  const parseErr = doc.querySelector("parsererror");
  if (parseErr) throw new Error("XML parse error: " + parseErr.textContent.slice(0, 200));
  const workouts = doc.querySelectorAll("Workout");
  const sessions = [];
  workouts.forEach(w => {
    const startDate = w.getAttribute("startDate");
    if (!startDate) return;
    // Apple stores "YYYY-MM-DD HH:MM:SS ±HHMM" in LOCAL time — first 10 chars
    // are already the correct local date.
    const date = startDate.slice(0, 10);
    if (!/^\d{4}-\d{2}-\d{2}$/.test(date)) return;

    // Duration: attribute is the only source. Convert seconds to minutes.
    let duration = parseFloat(w.getAttribute("duration")) || 0;
    const durationUnit = w.getAttribute("durationUnit") || "min";
    if (durationUnit === "s") duration = duration / 60;
    duration = Math.round(duration * 10) / 10;

    // Distance: try the old attribute form, then look in WorkoutStatistics.
    let distance = parseFloat(w.getAttribute("totalDistance")) || 0;
    let distanceUnit = w.getAttribute("totalDistanceUnit") || "km";
    if (!distance) {
      const distStat = Array.from(w.querySelectorAll("WorkoutStatistics"))
        .find(s => /Distance/.test(s.getAttribute("type") || ""));
      if (distStat) {
        distance = parseFloat(distStat.getAttribute("sum")) || 0;
        distanceUnit = distStat.getAttribute("unit") || "km";
      }
    }
    if (distanceUnit === "mi") distance = distance * 1.609344;
    else if (distanceUnit === "m") distance = distance / 1000;  // Apple uses metres for swims
    distance = Math.round(distance * 100) / 100;

    // Calories — same dual-format pattern as distance.
    let calories = parseFloat(w.getAttribute("totalEnergyBurned")) || 0;
    if (!calories) {
      const calStat = Array.from(w.querySelectorAll("WorkoutStatistics"))
        .find(s => /ActiveEnergyBurned/.test(s.getAttribute("type") || ""));
      if (calStat) calories = parseFloat(calStat.getAttribute("sum")) || 0;
    }
    calories = Math.round(calories);

    const mapped = mapAppleActivity(w.getAttribute("workoutActivityType"));
    const data = {
      duration: duration > 0 ? String(duration) : "",
      distance: distance > 0 ? String(distance) : "",
      calories: calories > 0 ? String(calories) : "",
    };
    if (mapped.type) data.type = mapped.type;

    sessions.push({
      id: uid(),
      date,
      discipline: mapped.discipline,
      data,
    });
  });
  return sessions;
}

// ---------- Storage ----------
function loadSessions() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      state.sessions = JSON.parse(raw);
      // v0.10: Cycle -> Walk.  v0.19: Weights -> Strength.
      // v0.26: Strength's totalSets + topLift collapse into a single "details" field.
      state.sessions.forEach(s => {
        if (s.discipline === "Cycle") s.discipline = "Walk";
        if (s.discipline === "Weights") s.discipline = "Strength";
        if (s.discipline === "Strength" && s.data) {
          const sets = (s.data.totalSets || "").toString().trim();
          const lift = (s.data.topLift || "").toString().trim();
          if ((sets || lift) && !s.data.details) {
            const parts = [];
            if (sets) parts.push(sets + " sets");
            if (lift) parts.push(lift);
            s.data.details = parts.join(" · ");
          }
          delete s.data.totalSets;
          delete s.data.topLift;
        }
      });
    }
  } catch (e) { console.warn("Load failed", e); }
}
function saveSessions() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.sessions)); }
  catch (e) { console.warn("Save failed", e); }
}
function loadSettings() {
  try {
    const raw = localStorage.getItem(SETTINGS_KEY);
    if (raw) {
      const s = JSON.parse(raw);
      if (s.weight) state.weight = Number(s.weight);
      if (s.height) state.height = Number(s.height);
    }
  } catch (e) { console.warn("Load settings failed", e); }
}

  try { localStorage.setItem(SETTINGS_KEY, JSON.stringify({ weight: state.weight, height: state.height })); }
  catch (e) { console.warn("Save settings failed", e); }
}

// ---------- Computed helpers ----------
function autoPace(distance, duration) {
  const d = parseFloat(distance), m = parseFloat(duration);
  if (!d || !m || d <= 0) return "";
  const paceMin = m / d;
  const mins = Math.floor(paceMin);
  const secs = Math.round((paceMin - mins) * 60);
  return `${mins}:${String(secs).padStart(2, "0")}`;
}
function autoSplit(distance, duration) {
  const d = parseFloat(distance), m = parseFloat(duration);
  if (!d || !m || d <= 0) return "";
  const splitMin = m / (d * 2); // per 500m
  const mins = Math.floor(splitMin);
  const secs = Math.round((splitMin - mins) * 60);
  return `${mins}:${String(secs).padStart(2, "0")}`;
}
function autoSpeed(distance, duration) {
  const d = parseFloat(distance), m = parseFloat(duration);
  if (!d || !m || m <= 0) return "";
  return ((d / m) * 60).toFixed(1);
}
// Parse a split like "1:52" or "2:07.5" to seconds. Returns 0 if invalid.
function parseSplitToSeconds(s) {
  if (!s) return 0;
  const str = String(s).trim();
  const m = /^(\d{1,2}):(\d{1,2}(?:\.\d+)?)$/.exec(str);
  if (!m) return 0;
  const mins = parseInt(m[1], 10);
  const secs = parseFloat(m[2]);
  if (isNaN(mins) || isNaN(secs) || secs >= 60) return 0;
  return mins * 60 + secs;
}
// Concept2's split-to-power formula:
//   power (W) = 2.80 / pace^3, where pace is in sec per metre
//   so pace_per_m = split_sec_per_500m / 500
function rowingPowerFromSplit500(splitSeconds) {
  if (!splitSeconds || splitSeconds <= 0) return 0;
  const pacePerMeter = splitSeconds / 500;
  return 2.80 / Math.pow(pacePerMeter, 3);
}
// MET from power using anchors that match runbundle's calculator.
// First three are midpoints of the 2024 Compendium's stationary-rowing bands;
// the 200W anchor is the START of the ≥200W band (compendium's 14 MET value
// pinned exactly); 290W is the male elite peak from runbundle's text, used
// as the upper extrapolation anchor at 17.5 MET so the curve keeps rising
// for high-power workouts without an awkward flat-line cap.
//   50W  -> 5.0 MET   (midpoint of <100W band)
//   125W -> 7.5 MET   (midpoint of 100-149W band)
//   175W -> 11.0 MET  (midpoint of 150-199W band)
//   200W -> 14.0 MET  (start of ≥200W band — pinned to compendium)
//   290W -> 17.5 MET  (elite reference, extrapolation anchor)
// Linear interp between, extrapolation outside, MET floor of 3.
function rowingMetFromPower(watts) {
  const anchors = [[50, 5.0], [125, 7.5], [175, 11.0], [200, 14.0], [290, 17.5]];
  if (watts <= anchors[0][0]) {
    const [x1, y1] = anchors[0], [x2, y2] = anchors[1];
    const slope = (y2 - y1) / (x2 - x1);
    return Math.max(3, y1 + slope * (watts - x1));
  }
  for (let i = 0; i < anchors.length - 1; i++) {
    const [x1, y1] = anchors[i], [x2, y2] = anchors[i + 1];
    if (watts <= x2) {
      const slope = (y2 - y1) / (x2 - x1);
      return y1 + slope * (watts - x1);
    }
  }
  const [x1, y1] = anchors[anchors.length - 2];
  const [x2, y2] = anchors[anchors.length - 1];
  const slope = (y2 - y1) / (x2 - x1);
  return y2 + slope * (watts - x2);
}
function metFor(discipline, duration, distance, splitStr) {
  const baseMET = MET_DEFAULTS[discipline] || 5;
  const dur = parseFloat(duration), dist = parseFloat(distance);
  if (!dur || dur <= 0) return baseMET;
  // Run: refine by pace (min/km)
  if (discipline === "Run" && dist > 0) {
    const pace = dur / dist;
    if (pace < 4) return 14.5;
    if (pace < 5) return 11.5;
    if (pace < 6) return 9.8;
    if (pace < 7) return 8.3;
    return 6.8;
  }
  // Walk: refine by avg speed (km/h) — values from 2024 Compendium of
  // Physical Activities (walking section), thresholds in km/h:
  //   2 mph (3.2 km/h)  -> 2.8 MET (slow)
  //   2.5 mph (4.0 km/h) -> 3.0 MET
  //   3 mph (4.8 km/h)  -> 3.5 MET (moderate)
  //   3.5 mph (5.6 km/h) -> 4.3 MET (brisk)
  //   4 mph (6.4 km/h)  -> 5.0 MET (very brisk)
  //   4.5 mph (7.2 km/h) -> 7.0 MET (essentially light jogging)
  if (discipline === "Walk" && dist > 0) {
    const speed = (dist / dur) * 60;
    if (speed > 7.2) return 7.0;
    if (speed > 6.4) return 5.5;
    if (speed > 5.6) return 5.0;
    if (speed > 4.8) return 4.3;
    if (speed > 4.0) return 3.5;
    if (speed > 3.2) return 3.0;
    return 2.8;
  }
  // Row: runbundle / 2024 Compendium method via Concept2 split->power.
  // Prefer an explicit avgSplit if the user typed one (most accurate, matches
  // what the rower's display reports); otherwise derive from distance + dur.
  if (discipline === "Row") {
    let splitSec = parseSplitToSeconds(splitStr);
    if (!splitSec && dist > 0) {
      splitSec = (dur * 60) / (dist * 2);  // sec per 500m
    }
    if (splitSec > 0) {
      const watts = rowingPowerFromSplit500(splitSec);
      return rowingMetFromPower(watts);
    }
  }
  return baseMET;
}
function calcCalories(discipline, duration, distance, splitStr) {
  const dur = parseFloat(duration);
  if (!dur || dur <= 0) return "";
  const weight = state.weight || 94;
  const met = metFor(discipline, duration, distance, splitStr);
  return String(Math.round(met * weight * (dur / 60)));
}

function renderComputedHint(fieldKey) {
  const d = state.form.distance, m = state.form.duration;
  if (fieldKey === "pace" && d && m && !state.form.pace) {

    return p ? `<div class="computed-hint">auto: ${p} min/km — tap to use</div>` : "";
  }
  if (fieldKey === "avgSplit" && d && m && !state.form.avgSplit) {
    const p = autoSplit(d, m);
    return p ? `<div class="computed-hint">auto: ${p} /500m — tap to use</div>` : "";
  }
  if (fieldKey === "avgSpeed" && d && m && !state.form.avgSpeed) {
    const s = autoSpeed(d, m);
    return s ? `<div class="computed-hint">auto: ${s} km/h — tap to use</div>` : "";
  }
  if (fieldKey === "calories" && m && !state.form.calories) {
    const c = calcCalories(state.activeDiscipline, m, d, state.form.avgSplit);
    return c ? `<div class="computed-hint">auto: ~${c} kcal — tap to use</div>` : "";
  }
  return "";
}

function renderDailyVolume(period) {
  const range = state.historyRange || "week";
  const offset = state.historyOffset || 0;
  const metric = state.historyMetric || "minutes";
  const isMin = metric === "minutes";
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const todayKey = localISO(today);
  const buckets = [];   // [{ key, date, label: {top, bot}, isToday, isWeekend, totals, total }]
  let granularity = "day";  // or "week" for all-time
  let chartTitle = "";
  const metricNoun = isMin ? "TRAINING TIME" : "CALORIES";

  if (range === "week") {
    chartTitle = `DAILY ${metricNoun}`;
    // Walk the selected week (Monday → Sunday); period.start is that Monday.
    const monday = period && period.start ? new Date(period.start) : mondayOf(today);
    for (let i = 0; i < 7; i++) {
      const d = new Date(monday); d.setDate(monday.getDate() + i);
      buckets.push({
        key: localISO(d), date: d,
        label: { top: d.toLocaleDateString("en-AU", { weekday: "narrow" }), bot: String(d.getDate()) },
        isToday: localISO(d) === todayKey,
        isWeekend: d.getDay() === 0 || d.getDay() === 6,
      });
    }
  } else if (range === "month") {
    chartTitle = `DAILY ${metricNoun}`;
    const first = period && period.start ? new Date(period.start) : new Date(today.getFullYear(), today.getMonth(), 1);
    const last = period && period.end ? new Date(period.end) : new Date(today.getFullYear(), today.getMonth() + 1, 0);
    for (let d = new Date(first); d <= last; d.setDate(d.getDate() + 1)) {
      const day = new Date(d);
      buckets.push({
        key: localISO(day), date: day,
        label: { top: day.toLocaleDateString("en-AU", { weekday: "narrow" }), bot: String(day.getDate()) },
        isToday: localISO(day) === todayKey,
        isWeekend: day.getDay() === 0 || day.getDay() === 6,
      });
    }
  } else {
    // All time: aggregate by calendar month or Mon-Sun week, user toggleable.
    const allGran = state.allTimeGranularity || "month";
    granularity = allGran;
    chartTitle = `${allGran === "week" ? "WEEKLY" : "MONTHLY"} ${metricNoun}`;
    if (state.sessions.length === 0) {
      if (allGran === "week") {
        const monday = mondayOf(today);
        buckets.push({
          key: localISO(monday), date: monday,
          label: { top: monday.toLocaleDateString("en-AU", { month: "short" }).toUpperCase(), bot: String(monday.getDate()) },
          isToday: true, isWeekend: false,
        });
      } else {
        const first = firstOfMonth(today);
        buckets.push({
          key: monthKey(first), date: first,
          label: { top: first.toLocaleDateString("en-AU", { month: "short" }).toUpperCase(), bot: "'" + String(first.getFullYear()).slice(-2) },
          isToday: true, isWeekend: false,
        });
      }
    } else {
      let earliest = state.sessions[0].date;
      state.sessions.forEach(s => { if (s.date < earliest) earliest = s.date; });
      if (allGran === "week") {
        const startMonday = mondayOf(parseLocalISO(earliest));
        const currentMonday = mondayOf(today);
        const thisMondayKey = localISO(currentMonday);
        for (let m = new Date(startMonday); m <= currentMonday; m.setDate(m.getDate() + 7)) {
          const wk = new Date(m);
          buckets.push({
            key: localISO(wk), date: wk,
            label: { top: wk.toLocaleDateString("en-AU", { month: "short" }).toUpperCase(), bot: String(wk.getDate()) },
            isToday: localISO(wk) === thisMondayKey,
            isWeekend: false,
          });
        }
      } else {
        const startMonth = firstOfMonth(parseLocalISO(earliest));
        const currentMonth = firstOfMonth(today);
        const thisMonthKey = monthKey(currentMonth);
        const cursor = new Date(startMonth);
        while (cursor <= currentMonth) {
          const m = new Date(cursor);
          const monthLabel = m.toLocaleDateString("en-AU", { month: "short" }).toUpperCase();
          const showYear = m.getMonth() === 0 || (buckets.length === 0);
          buckets.push({
            key: monthKey(m), date: m,
            label: { top: monthLabel, bot: showYear ? "'" + String(m.getFullYear()).slice(-2) : "" },
            isToday: monthKey(m) === thisMonthKey,
            isWeekend: false,
          });
          cursor.setMonth(cursor.getMonth() + 1);
        }
      }
    }
  }

  // zero out totals
  buckets.forEach(b => { b.totals = {}; DISCIPLINES.forEach(d => b.totals[d] = 0); b.total = 0; });

  // Weekly All Time view crams a lot of columns in. Thin the x-axis labels
  // to every 4th bucket (counting back from the most recent) so today's
  // column always anchors the chart.
  if (range === "all" && granularity === "week") {
    const lastIdx = buckets.length - 1;
    buckets.forEach((b, i) => {
      if ((lastIdx - i) % 4 !== 0) b.hideLabel = true;
    });
  }

  // aggregate session values (duration in minutes OR calories) per bucket
  state.sessions.forEach(s => {
    const val = parseFloat(isMin ? s.data?.duration : s.data?.calories);
    if (!val || val <= 0) return;
    let bucketKey;
    if (granularity === "day") {
      bucketKey = s.date;
    } else if (granularity === "month") {
      bucketKey = monthKey(parseLocalISO(s.date));
    } else {
      bucketKey = localISO(mondayOf(parseLocalISO(s.date)));
    }
    const b = buckets.find(x => x.key === bucketKey);
    if (!b) return;
    b.totals[s.discipline] = (b.totals[s.discipline] || 0) + val;
    b.total += val;
  });

  // pick a nice yMax that's a multiple of the gridStep — different scales per metric
  const rawMax = Math.max(...buckets.map(b => b.total), 0);
  function pickStepMin(v) {
    if (v <= 180) return 30;
    if (v <= 360) return 60;
    if (v <= 720) return 120;
    if (v <= 1440) return 240;
    return Math.ceil(v / 6 / 60) * 60;
  }
  function pickStepCal(v) {
    if (v <= 500) return 100;
    if (v <= 1000) return 200;
    if (v <= 2500) return 500;
    if (v <= 5000) return 1000;
    return Math.ceil(v / 5 / 1000) * 1000;
  }
  let step = isMin ? pickStepMin(rawMax) : pickStepCal(rawMax);
  let yMax = Math.max(step * 2, Math.ceil(rawMax / step) * step);
  if (yMax === 0) yMax = step * 2;
  const chartHeight = 160;

  // Average over ELAPSED buckets only (rest days included, future days excluded).
  // So on Wednesday in "this week" view, divide by 3 (Mon/Tue/Wed) — not 7.
  // For all-time weekly view: count weeks whose Monday is on or before today.
  const elapsedBuckets = buckets.filter(b => b.date <= today);
  const avgVal = elapsedBuckets.length > 0
    ? elapsedBuckets.reduce((sum, b) => sum + b.total, 0) / elapsedBuckets.length
    : 0;

  function fmtMin(m) {
    m = Math.round(m);
    if (m === 0) return "0";
    if (m < 60) return m + "m";
    const h = Math.floor(m / 60), rem = m % 60;
    return rem === 0 ? h + "h" : h + "h " + rem + "m";
  }
  function fmtCal(c) {
    c = Math.round(c);
    if (c >= 1000) return (c / 1000).toFixed(c % 1000 === 0 ? 0 : 1) + "k";
    return String(c);
  }
  const fmtVal = isMin ? fmtMin : fmtCal;
  const unitLabel = isMin ? "" : " kcal";
  // Y-axis: plain integer minutes in Week view, otherwise the normal h/m mix.
  const fmtYAxis = (range === "week" && isMin)
    ? (v => v === 0 ? "0" : String(v))
    : fmtVal;
  // Bar labels on All Time + minutes: convert to hours with one decimal.
  // Otherwise (Week minutes, any mode calories) just an integer of the unit.
  const fmtBarLabel = (range === "all" && isMin)
    ? (v => (v / 60).toFixed(1))
    : (v => String(Math.round(v)));

  // Build y-axis ticks (every step from 0 to yMax inclusive)
  const ticks = [];
  for (let v = 0; v <= yMax; v += step) ticks.push(v);

  const dense = buckets.length > 14;
  const yAxisHTML = ticks.map(v => {
    const pctFromTop = ((yMax - v) / yMax) * 100;
    const zero = v === 0 ? "y-zero" : "";
    return `<span class="${zero}" style="top:${pctFromTop}%;">${fmtYAxis(v)}</span>`;
  }).join("");
  const gridHTML = ticks.map(v => {
    const pctFromTop = ((yMax - v) / yMax) * 100;
    const zero = v === 0 ? "zero" : "";
    return `<div class="${zero}" style="top:${pctFromTop}%;"></div>`;
  }).join("");

  // Average line position (from bottom). Only show if avg > 0 and chart has data.
  // The line itself communicates the average — no label, since the chart area is tight.
  const avgPctFromBottom = avgVal > 0 ? (avgVal / yMax) * 100 : 0;
  const avgLineHTML = avgVal > 0 ? `<div class="daily-avg-line" style="bottom:${avgPctFromBottom}%;"></div>` : "";

  return `
    <div>
      <div class="chart-header">
        <div class="weekly-chart-label">${chartTitle}</div>
        <div class="chart-header-toggles">
          ${range === "all" ? `
            <div class="metric-toggle">
              <button class="metric-btn ${(state.allTimeGranularity || "month") === "week" ? "active" : ""}" data-all-gran="week">WK</button>
              <button class="metric-btn ${(state.allTimeGranularity || "month") === "month" ? "active" : ""}" data-all-gran="month">MTH</button>
            </div>
          ` : ""}
          <div class="metric-toggle">
            <button class="metric-btn ${isMin ? "active" : ""}" data-metric="minutes">MIN</button>
            <button class="metric-btn ${!isMin ? "active" : ""}" data-metric="calories">CAL</button>
          </div>
        </div>
      </div>
      <div class="daily-chart ${dense ? "dense" : ""}">
        <div class="daily-y-axis">${yAxisHTML}</div>
        <div class="daily-grid">${gridHTML}${avgLineHTML}</div>
        <div class="daily-bars">
          ${(() => {
            // Show numeric totals only on the views where columns are wide enough.
            const showLabels = range === "week" || (range === "all" && granularity === "month");
            const SEG_MIN_PX = 16;  // hide segment label if segment shorter than this
            return buckets.map(b => {
              const stackHeight = b.total > 0 ? (b.total / yMax) * chartHeight : 0;
              const segments = DISCIPLINES.filter(d => b.totals[d] > 0).map(d => {
                const segPct = (b.totals[d] / b.total) * 100;
                const segHeightPx = (b.totals[d] / yMax) * chartHeight;
                const segLabel = (showLabels && segHeightPx >= SEG_MIN_PX)
                  ? `<span class="daily-bar-seg-label">${fmtBarLabel(b.totals[d])}</span>` : "";
                return `<div class="daily-bar-seg" title="${d}: ${fmtVal(b.totals[d])}${unitLabel}" style="height:${segPct}%; background:${DISCIPLINE_CONFIG[d].color};">${segLabel}</div>`;
              }).join("");
              const colTotal = (showLabels && b.total > 0)
                ? `<div class="daily-bar-total" style="bottom:${stackHeight + 3}px;">${fmtBarLabel(b.total)}</div>` : "";
              const cls = [b.isWeekend ? "weekend" : "", b.isToday ? "today" : ""].filter(Boolean).join(" ");
              return `
                <div class="daily-bar-col" title="${fmtVal(b.total)}${unitLabel}">
                  ${colTotal}
                  <div class="daily-bar-stack" style="height:${stackHeight}px;">${segments}</div>
                  <div class="daily-bar-label ${cls}">
                    ${b.hideLabel ? "" : `<span class="dow">${b.label.top}</span><span class="dom">${b.label.bot}</span>`}
                  </div>
                </div>
              `;
            }).join("");
          })()}
        </div>
      </div>
      <div class="weekly-legend">
        ${DISCIPLINES.map(d => `
          <div class="weekly-legend-item">
            <div class="weekly-legend-swatch" style="background:${DISCIPLINE_CONFIG[d].color};"></div>
            ${d}
          </div>
        `).join("")}
      </div>
    </div>
  `;
}

function renderDisciplineStats(discipline, period) {
  // Filter to this discipline AND to the selected period (if bounded).
  let ds = state.sessions.filter(s => s.discipline === discipline);
  if (period && period.start && period.end) {
    const startKey = localISO(period.start);
    const endKey = localISO(period.end);
    ds = ds.filter(s => s.date >= startKey && s.date <= endKey);
  }
  if (ds.length === 0) {
    const where = period && period.start ? ` in ${period.label.toLowerCase()}` : "";
    return `<div class="empty-state">No ${discipline.toLowerCase()} sessions${where}.</div>`;
  }

  const cfg = DISCIPLINE_CONFIG[discipline];
  const totalDist = ds.filter(s => s.data.distance).reduce((a, b) => a + Number(b.data.distance), 0);
  const totalDur = ds.filter(s => s.data.duration).reduce((a, b) => a + Number(b.data.duration), 0);
  const totalCal = ds.filter(s => s.data.calories).reduce((a, b) => a + Number(b.data.calories), 0);

  const cards = [
    { value: ds.length, label: "Sessions" },
    totalDist > 0 ? { value: totalDist.toFixed(1) + "km", label: "Total Distance" } : null,
    totalDur > 0 ? { value: fmtDuration(totalDur), label: "Total Time" } : null,
    totalCal > 0 ? { value: Math.round(totalCal).toLocaleString(), label: "Total kcal" } : null,
  ].filter(Boolean);

  return `
    <div class="stats-grid">
      ${cards.map(c => `
        <div class="stat-card">
          <div class="stat-value" style="color:${cfg.color};">${c.value}</div>
          <div class="stat-label">${c.label}</div>
        </div>
      `).join("")}
    </div>
    <div class="history-list">
      ${ds.slice().reverse().slice(0, 50).map(s => {
        if (s.id === state.editingId) return renderHistoryEdit(s, cfg);
        const fieldHtml = cfg.fields.filter(f => s.data[f.key]).map(f => {
          // duration gets the smart formatter so 90 -> "1h 30m"; others use a static unit.
          let displayVal;
          if (f.key === "duration") {
            displayVal = fmtDuration(s.data[f.key]);
          } else {
            const unit = f.key === "distance" ? "km"
              : f.key === "totalSets" ? " sets"
              : f.key === "calories" ? " kcal"
              : f.key === "avgSpeed" ? " km/h"
              : "";
            displayVal = escapeHtml(s.data[f.key]) + unit;
          }
          const labelShort = f.key === "type" ? "" : f.label.split(" ")[0];
          return `<div class="history-field">${labelShort ? `<span class="history-field-label">${labelShort}</span>` : ""}${displayVal}</div>`;
        }).join("");
        return `
          <div class="history-item" data-edit="${s.id}" style="border-left-color:${cfg.color};">
            <button class="history-delete" data-delete="${s.id}" aria-label="Delete session">×</button>
            <div class="history-item-top">
              <div class="history-date">${formatDate(s.date)}</div>
            </div>
            <div class="history-data">${fieldHtml}</div>
          </div>
        `;
      }).join("")}
    </div>
  `;
}

function renderHistoryEdit(s, cfg) {
  return `
    <div class="history-item editing" style="border-left-color:${cfg.color};">
      <div class="history-item-top">
        <div class="history-date" style="color:#fff; font-weight:500;">EDITING · ${cfg.icon} ${s.discipline}</div>
      </div>
      <div class="history-edit">
        <div class="history-edit-field">
          <label class="history-edit-field-label">Date</label>
          <input class="input" type="date" data-edit-field="__date" value="${escapeHtml(s.date)}">
        </div>
        ${cfg.fields.map(f => {
          const isNumber = f.type === "number";
          const allowsDecimal = isNumber && !!f.step;
          const actualType = isNumber ? "text" : f.type;
          const inputmode = isNumber ? (allowsDecimal ? "decimal" : "numeric") : "";
          return `
            <div class="history-edit-field">
              <label class="history-edit-field-label">${f.label.toUpperCase()}</label>
              <input class="input" type="${actualType}"
                ${inputmode ? `inputmode="${inputmode}"` : ""}
                autocomplete="off" autocorrect="off" spellcheck="false"
                placeholder="${escapeHtml(f.placeholder || "")}"
                value="${escapeHtml(s.data[f.key] || "")}"
                data-edit-field="${f.key}">
            </div>
          `;
        }).join("")}
        <div class="history-edit-actions">
          <button type="button" class="history-edit-cancel" data-edit-cancel>CANCEL</button>
          <button type="button" class="history-edit-save" data-edit-save="${s.id}">SAVE</button>
        </div>
      </div>
    </div>
  `;
}

// ---------- Handlers ----------
function attachHandlers() {
  document.querySelectorAll("[data-view]").forEach(b => {
    b.addEventListener("click", () => { state.view = b.dataset.view; render(); });
  });
  document.querySelectorAll("[data-discipline]").forEach(b => {
    b.addEventListener("click", () => {
      state.activeDiscipline = b.dataset.discipline;
      state.form = emptyForm(state.activeDiscipline);
      render();
    });
  });
  document.querySelectorAll("[data-history-tab]").forEach(b => {
    b.addEventListener("click", () => { state.historyTab = b.dataset.historyTab; render(); });
  });
  document.querySelectorAll("[data-range]").forEach(b => {
    b.addEventListener("click", () => {
      state.historyRange = b.dataset.range;
      state.historyOffset = 0;  // always start at the current period when switching
      render();
    });
  });
  document.querySelectorAll("[data-period-step]").forEach(b => {
    b.addEventListener("click", () => {
      const n = parseInt(b.dataset.periodStep, 10) || 0;
      state.historyOffset = (state.historyOffset || 0) + n;
      // Clamp: don't go past the current period (no future data).
      if (state.historyOffset > 0) state.historyOffset = 0;
      render();
    });
  });
  document.querySelectorAll("[data-metric]").forEach(b => {
    b.addEventListener("click", () => { state.historyMetric = b.dataset.metric; render(); });
  });
  document.querySelectorAll("[data-all-gran]").forEach(b => {
    b.addEventListener("click", () => { state.allTimeGranularity = b.dataset.allGran; render(); });
  });
  document.querySelectorAll("[data-field]").forEach(input => {
    input.addEventListener("input", e => {
      let val = e.target.value;
      const im = input.getAttribute("inputmode");
      // Normalize: iOS sometimes shows comma instead of period on decimal keypad
      if (im === "decimal" && val.includes(",")) {
        val = val.replace(/,/g, ".");
        e.target.value = val;
      }
      state.form[input.dataset.field] = val;
      // Re-render only if a hint needs to update or RPE preview changes
      const key = input.dataset.field;
      if (key === "distance" || key === "duration" || key === "avgSplit") {
        // Preserve focus
        const focused = document.activeElement.dataset?.field;
        const selStart = document.activeElement.selectionStart;
        render();
        if (focused) {
          const el = document.querySelector(`[data-field="${focused}"]`);
          if (el) { el.focus(); try { el.setSelectionRange(selStart, selStart); } catch {} }
        }
      }
    });
  });
  const dateInput = document.getElementById("dateInput");
  if (dateInput) dateInput.addEventListener("change", e => {
    if (e.target.value) { state.date = e.target.value; render(); }
  });
  document.querySelectorAll("[data-date-step]").forEach(b => {
    b.addEventListener("click", () => {
      const n = parseInt(b.dataset.dateStep, 10) || 0;
      const d = parseLocalISO(state.date);
      d.setDate(d.getDate() + n);
      state.date = localISO(d);
      render();
    });
  });

  const saveBtn = document.getElementById("saveBtn");
  if (saveBtn) saveBtn.addEventListener("click", handleSave);

  // Auto-fill computed hints when tapped
  document.querySelectorAll(".computed-hint").forEach(hint => {
    hint.addEventListener("click", () => {
      const cfg = DISCIPLINE_CONFIG[state.activeDiscipline];
      if (cfg.fields.find(f => f.key === "pace") && !state.form.pace) {
        state.form.pace = autoPace(state.form.distance, state.form.duration);
      }
      if (cfg.fields.find(f => f.key === "avgSplit") && !state.form.avgSplit) {
        state.form.avgSplit = autoSplit(state.form.distance, state.form.duration);
      }
      if (cfg.fields.find(f => f.key === "avgSpeed") && !state.form.avgSpeed) {
        state.form.avgSpeed = autoSpeed(state.form.distance, state.form.duration);
      }
      if (cfg.fields.find(f => f.key === "calories") && !state.form.calories) {
        state.form.calories = calcCalories(state.activeDiscipline, state.form.duration, state.form.distance, state.form.avgSplit);
      }
      render();
    });
  });

  // Delete buttons (stop propagation so they don't trigger the row's edit click)
  document.querySelectorAll("[data-delete]").forEach(btn => {
    btn.addEventListener("click", e => {
      e.stopPropagation();
      const id = btn.dataset.delete;
      if (!confirm("Delete this session?")) return;
      state.sessions = state.sessions.filter(s => String(s.id) !== String(id));
      saveSessions();
      render();
      showToast("Session deleted");
    });
  });

  // Tap a history row to enter edit mode
  document.querySelectorAll("[data-edit]").forEach(row => {
    row.addEventListener("click", () => {
      state.editingId = row.dataset.edit;
      render();
    });
  });
  // Cancel edit
  document.querySelectorAll("[data-edit-cancel]").forEach(btn => {
    btn.addEventListener("click", () => {
      state.editingId = null;
      render();
    });
  });
  // Save edit — collect the values from the inline inputs, write back to the
  // session, persist, then exit edit mode.
  document.querySelectorAll("[data-edit-save]").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = btn.dataset.editSave;
      const session = state.sessions.find(s => String(s.id) === String(id));
      if (!session) { state.editingId = null; render(); return; }
      const inputs = document.querySelectorAll("[data-edit-field]");
      inputs.forEach(inp => {
        const k = inp.dataset.editField;
        let v = inp.value;
        // iOS comma -> period normalization for decimal fields
        if (inp.getAttribute("inputmode") === "decimal" && v.includes(",")) v = v.replace(/,/g, ".");
        if (k === "__date") {
          if (v) session.date = v;
        } else {
          session.data[k] = v;
        }
      });
      saveSessions();
      state.editingId = null;
      render();
      showToast("Session updated");
    });
  });

  // Menu
  const openMenu = document.getElementById("openMenu");
  if (openMenu) openMenu.addEventListener("click", () => {
    document.getElementById("weightDisplay").textContent = state.weight + "kg";
    document.getElementById("menuSheet").classList.add("open");
  });
}

function handleSave() {
  const hasData = Object.values(state.form).some(v => v !== "");
  if (!hasData) {
    showToast("Add at least one value");
    return;
  }
  // Auto-fill computed fields if blank but inputs present
  const cfg = DISCIPLINE_CONFIG[state.activeDiscipline];
  if (cfg.fields.find(f => f.key === "pace") && !state.form.pace) {
    const p = autoPace(state.form.distance, state.form.duration);
    if (p) state.form.pace = p;
  }
  if (cfg.fields.find(f => f.key === "avgSplit") && !state.form.avgSplit) {
    const p = autoSplit(state.form.distance, state.form.duration);
    if (p) state.form.avgSplit = p;
  }
  if (cfg.fields.find(f => f.key === "avgSpeed") && !state.form.avgSpeed) {
    const s = autoSpeed(state.form.distance, state.form.duration);
    if (s) state.form.avgSpeed = s;
  }
  if (cfg.fields.find(f => f.key === "calories") && !state.form.calories) {
    const c = calcCalories(state.activeDiscipline, state.form.duration, state.form.distance, state.form.avgSplit);
    if (c) state.form.calories = c;
  }
  const session = { id: uid(), date: state.date, discipline: state.activeDiscipline, data: { ...state.form } };
  state.sessions.push(session);
  saveSessions();
  state.form = emptyForm(state.activeDiscipline);
  state.saved = true;
  render();
  setTimeout(() => { state.saved = false; render(); }, 2000);
}

function renderWorkoutPlan(mode) {
  // mode: "workout" -> show only structured workouts;
  //       "exercises" -> show only the exercise reference bank.
  const titleEl = document.querySelector("#workoutSheet .workout-title");
  let content = "";
  if (mode === "workout") {
    if (titleEl) titleEl.textContent = "Workout #1";
    content = WORKOUTS.map(w => {
      const sections = w.sections.map(sec => {
        const moves = sec.moves.map((name, i) => {
          const isRest = name.toLowerCase() === "rest";
          return `
            <div class="workout-step ${isRest ? "is-rest" : ""}">
              <span class="step-num">${i + 1}</span>
              <span class="move">${escapeHtml(name)}</span>
            </div>
          `;
        }).join("");
        return `
          <div class="workout-section">
            <div class="workout-section-title">${escapeHtml(sec.title)}</div>
            ${moves}
          </div>
        `;
      }).join("");
      return `
        <div class="workout-card is-workout">
          <div class="workout-card-head">
            <div class="workout-card-name">${w.icon} ${escapeHtml(w.title)}</div>
            ${w.note ? `<div class="workout-card-weeks">${escapeHtml(w.note)}</div>` : ""}
          </div>
          ${sections}
        </div>
      `;
    }).join("");
  } else {
    if (titleEl) titleEl.textContent = "Strength Exercises";
    const legend = `
      <div class="workout-legend">
        <span><span class="ti">🏋️</span> Weights</span>
        <span><span class="ti">💪</span> Bodyweight</span>
      </div>
    `;
    const cards = WORKOUT_PLAN.map(cat => {
      const rows = cat.exercises.map(([type, name]) => `
        <div class="workout-row">
          <span class="ti">${type === "w" ? "🏋️" : "💪"}</span>
          <span class="ex">${escapeHtml(name)}</span>
        </div>
      `).join("");
      return `
        <div class="workout-card">
          <div class="workout-card-head">
            <div class="workout-card-name">${cat.icon} ${escapeHtml(cat.title)}</div>
            <div class="workout-card-weeks">${cat.exercises.length}</div>
          </div>
          ${rows}
        </div>
      `;
    }).join("");
    content = legend + cards;
  }
  document.getElementById("workoutContent").innerHTML = content;
}

// ---------- Menu / Import / Export ----------
// Attach iOS-style swipe-down-to-dismiss to a bottom sheet. The drag only
// counts when the inner is scrolled to the top — otherwise the user's
// touch is interpreted as content scrolling.
function attachSheetSwipe(sheetEl, innerEl) {
  if (!sheetEl || !innerEl) return;
  let startY = null;
  let dragging = false;
  innerEl.addEventListener("touchstart", e => {
    startY = e.touches[0].clientY;
    dragging = innerEl.scrollTop <= 0;
    innerEl.style.transition = "none";
  }, { passive: true });
  innerEl.addEventListener("touchmove", e => {
    if (!dragging || startY === null) return;
    if (innerEl.scrollTop > 0) {
      dragging = false;
      innerEl.style.transform = "";
      return;
    }
    const delta = e.touches[0].clientY - startY;
    if (delta > 0) innerEl.style.transform = `translateY(${delta}px)`;
  }, { passive: true });
  innerEl.addEventListener("touchend", e => {
    if (!dragging || startY === null) { startY = null; return; }
    const delta = (e.changedTouches[0].clientY || 0) - startY;
    innerEl.style.transition = "transform 0.25s ease";
    if (delta > 100) {
      innerEl.style.transform = "translateY(100%)";
      setTimeout(() => {
        sheetEl.classList.remove("open");
        innerEl.style.transform = "";
        innerEl.style.transition = "";
      }, 250);
    } else {
      innerEl.style.transform = "";
    }
    startY = null;
    dragging = false;
  }, { passive: true });
}

function setupMenu() {
  const sheet = document.getElementById("menuSheet");
  document.getElementById("closeMenuBtn").addEventListener("click", () => sheet.classList.remove("open"));
  sheet.addEventListener("click", e => { if (e.target === sheet) sheet.classList.remove("open"); });

  // Wire up swipe-down on both bottom sheets.
  attachSheetSwipe(sheet, sheet.querySelector(".menu-sheet-inner"));
  attachSheetSwipe(document.getElementById("workoutSheet"), document.querySelector("#workoutSheet .workout-sheet-inner"));

  document.getElementById("settingsBtn").addEventListener("click", () => {
    const newWeight = prompt(`Bodyweight in kg (used for calorie estimates):`, state.weight);
    if (newWeight !== null) {
      const w = parseFloat(String(newWeight).replace(",", "."));
      if (!isNaN(w) && w > 0 && w < 500) {
        state.weight = w;
        saveSettings();
        showToast(`Bodyweight set to ${w}kg`);
      } else {
        alert("Please enter a valid weight in kg.");
      }
    }
    sheet.classList.remove("open");
  });
  document.getElementById("exportBtn").addEventListener("click", () => {
    download("training-log.json", JSON.stringify(state.sessions, null, 2), "application/json");
    sheet.classList.remove("open");
  });
  document.getElementById("exportCsvBtn").addEventListener("click", () => {
    download("training-log.csv", toCsv(state.sessions), "text/csv");
    sheet.classList.remove("open");
  });
  document.getElementById("importBtn").addEventListener("click", () => {
    document.getElementById("importFile").click();
  });
  // Apple Health: pick the export.xml (after unzipping the Health export zip).
  document.getElementById("importAppleBtn").addEventListener("click", () => {
    document.getElementById("importAppleFile").click();
  });
  document.getElementById("workoutBtn").addEventListener("click", () => {
    renderWorkoutPlan("workout");
    sheet.classList.remove("open");
    document.getElementById("workoutSheet").classList.add("open");
  });
  document.getElementById("workoutPlanBtn").addEventListener("click", () => {
    renderWorkoutPlan("exercises");
    sheet.classList.remove("open");
    document.getElementById("workoutSheet").classList.add("open");
  });
  document.getElementById("closeWorkoutBtn").addEventListener("click", () => {
    document.getElementById("workoutSheet").classList.remove("open");
  });
  document.getElementById("workoutSheet").addEventListener("click", e => {
    if (e.target.id === "workoutSheet") e.target.classList.remove("open");
  });
  document.getElementById("importAppleFile").addEventListener("change", e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const sessions = parseAppleHealthXML(reader.result);
        if (sessions.length === 0) {
          alert("No workouts found in this file. Make sure you picked the export.xml from your Apple Health export (not the zip).");
          e.target.value = "";
          return;
        }
        const counts = {};
        sessions.forEach(s => { counts[s.discipline] = (counts[s.discipline] || 0) + 1; });
        const breakdown = DISCIPLINES.filter(d => counts[d]).map(d => `${counts[d]} ${d}`).join(", ");
        const msg = `Found ${sessions.length} workouts: ${breakdown}.\n\nThis will REPLACE your current ${state.sessions.length} session${state.sessions.length === 1 ? "" : "s"}. Continue?`;
        if (confirm(msg)) {
          state.sessions = sessions;
          saveSessions();
          render();
          showToast(`Imported ${sessions.length} workouts from Apple Health`);
        }
      } catch (err) {
        alert("Could not read this Apple Health export: " + err.message);
      }
      e.target.value = "";
      document.getElementById("menuSheet").classList.remove("open");
    };
    reader.readAsText(file);
  });
  document.getElementById("importFile").addEventListener("change", e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (!Array.isArray(data)) throw new Error("Not an array");
        const confirmMsg = `Import ${data.length} sessions? This will REPLACE your current ${state.sessions.length} sessions.`;
        if (confirm(confirmMsg)) {
          state.sessions = data;
          saveSessions();
          render();
          showToast(`Imported ${data.length} sessions`);
        }
      } catch (err) {
        alert("Invalid JSON file: " + err.message);
      }
      e.target.value = "";
      sheet.classList.remove("open");
    };
    reader.readAsText(file);
  });
  document.getElementById("clearBtn").addEventListener("click", () => {
    if (confirm(`Delete ALL ${state.sessions.length} sessions? This cannot be undone.`)) {
      if (confirm("Are you really sure? Export a backup first if you might want it back.")) {
        state.sessions = [];
        saveSessions();
        render();
        showToast("All data cleared");
      }
    }
    sheet.classList.remove("open");
  });
}

function toCsv(sessions) {
  const headers = ["id","date","discipline","type","distance","duration","calories","pace","avgSplit","avgSpeed","totalSets","topLift"];
  const rows = [headers.join(",")];
  sessions.forEach(s => {
    const row = headers.map(h => {
      let v = h === "id" || h === "date" || h === "discipline" ? s[h] : s.data?.[h] ?? "";
      v = String(v ?? "");
      if (v.includes(",") || v.includes("\"") || v.includes("\n")) {
        v = '"' + v.replace(/"/g, '""') + '"';
      }
      return v;
    });
    rows.push(row.join(","));
  });
  return rows.join("\n");
}

function download(filename, content, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2000);
}

// ---------- Boot ----------
loadSettings();
loadSessions();
render();
setupMenu();

// Register the service worker so the app keeps working offline once it's
// been opened at least once on the network. Quiet failure if unsupported.
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(err => console.warn("SW reg failed", err));
  });
}
